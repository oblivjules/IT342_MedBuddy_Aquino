# ── Dev-profile overrides ─────────────────────────────────────────────────────
# This profile is the DEFAULT (spring.profiles.default=dev in application.properties),
# so it is active automatically when no SPRING_PROFILES_ACTIVE is set.
#
# Render explicitly sets SPRING_PROFILES_ACTIVE=prod, so this profile is
# NEVER active on Render — only on local developer machines.

# Enable SQL logging so you can see what Hibernate is generating locally.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Smaller pool for local dev — only one developer hitting a local/dev DB.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# Relax graceful shutdown timeout for faster restarts during development.
spring.lifecycle.timeout-per-shutdown-phase=5s
