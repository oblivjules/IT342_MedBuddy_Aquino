spring.application.name=medbuddy

# ── Active profile ───────────────────────────────────────────────
# Default is 'dev' so local runs get SQL logging and a smaller pool
# without having to set anything.
# Render overrides this to 'prod' via SPRING_PROFILES_ACTIVE=prod.
spring.profiles.default=dev

# ── Server ──────────────────────────────────────────────────────
# Render injects PORT; Spring Boot maps SERVER_PORT automatically.
server.port=${PORT:8080}
server.address=0.0.0.0
# Allow in-flight requests to complete before the process exits.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# ── Multipart uploads ───────────────────────────────────────────
# Keep the servlet limit in sync with profile-image validation so uploads
# reach the service layer instead of failing inside Tomcat at 1 MB.
# Increased to 10MB as a hard limit per non-functional requirements.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Database (Neon PostgreSQL) ───────────────────────────────────
# Set these in the Render dashboard (or a local .env.local for development).
# Neon pooled URL format:
#   jdbc:postgresql://<host>/<db>?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP connection pool (tuned for Neon pooler endpoint) ────
# Neon free tier allows ~10 server-side connections; keep the pool small.
# The pooler hostname contains "-pooler" and runs PgBouncer in transaction
# mode, so statement-level or session-level features must not be used.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
# Recycle connections before Neon's 30-minute idle-disconnect kicks in.
spring.datasource.hikari.max-lifetime=1200000
# Heartbeat — keeps idle connections alive through Neon's idle timeout.
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Flyway ──────────────────────────────────────────────────────
# Baseline existing schema so Flyway can track migrations from this point on.
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.outOfOrder=true

# ── JPA / Hibernate ──────────────────────────────────────────────
# ddl-auto=update is safe while the schema is still evolving.
# Switch to 'validate' once the schema is stable in production.
spring.jpa.hibernate.ddl-auto=update
# Canonical Spring Boot property for the Hibernate dialect.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Disable the open-session-in-view anti-pattern — avoids lazy-load in view layer.
spring.jpa.open-in-view=false
# SQL logging is OFF in production; enable it in application-dev.properties.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Prevent Hibernate from quoting every identifier (avoids "table not found" on
# lowercase-only PostgreSQL schemas when ddl-auto creates the tables).
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ── JWT ──────────────────────────────────────────────────────────
# For local-only convenience, a fallback key is provided.
jwt.secret=${JWT_SECRET:bWVkYnVkZHktbG9jYWwtZGV2LWp3dC1zZWNyZXQtcmVwbGFjZS1pbi1wcm9k}
jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins.
# Production example: https://medbuddy.vercel.app
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000,http://127.0.0.1:3000}

# ── Frontend URL (for payment redirects) ─────────────────────────
# Used by PayMongo for success, cancel, and failure redirects
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Google OAuth2 ────────────────────────────────────────────────
# Redirect URI registered in Google Cloud Console must match EXACTLY:
#   https://<your-render-service>.onrender.com/login/oauth2/code/google
# Placeholders allow the app to start without credentials — OAuth2 login
# will not function until real values are supplied.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── Mail (Brevo SMTP) ────────────────────────────────────────────
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN:}
spring.mail.password=${BREVO_SMTP_PASSWORD:}
# If BREVO_MAIL_FROM is unset, EmailService will fall back to spring.mail.username.
spring.mail.from=${BREVO_MAIL_FROM:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── Supabase Storage (S3-compatible) ─────────────────────────────
supabase.url=https://gcvtswpohtmbjfqqvnns.supabase.co
supabase.key=${SUPABASE_KEY}
supabase.bucket=medbuddy
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# ── App upload validation ───────────────────────────────────────
app.storage.max-profile-image-size-bytes=5242880

# PayMongo sandbox/test credentials
paymongo.secret-key=${PAYMONGO_SECRET_KEY:} 
paymongo.public-key=${PAYMONGO_PUBLIC_KEY:} 
paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET:}